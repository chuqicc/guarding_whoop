name: Build & Release Windows App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync package version with tag
        run: npm version --no-git-tag-version ($env:GITHUB_REF_NAME -replace '^v','')

      - name: Build frontend (production)
        run: npm run build:prod

      - name: Package Windows app
        run: npx electron-builder --win --publish never '-c.nsis.artifactName=guardingwhoop-Setup-${version}.${ext}' '-c.portable.artifactName=guardingwhoop-Portable-${version}.${ext}'

      - name: Create Release & upload exe
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            dist_electron/*.exe
            dist_electron/*.blockmap

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist_electron/*.exe
